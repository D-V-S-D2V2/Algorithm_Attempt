<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keniel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="parameters">
        <h3>Grid Dimensions</h3>
        <label for="grid_width">Grid Width (X):</label>
        <input type="number" id="grid_width" value="10" min="1">
        <label for="grid_length">Grid Length (Y):</label>
        <input type="number" id="grid_length" value="10" min="1">

        <h3>Boxes</h3>
        <label for="start_x">Start X:</label>
        <input type="number" id="start_x" value="1" min="0">
        <label for="start_y">Start Y:</label>
        <input type="number" id="start_y" value="1" min="0">
        <br><br>
        <label for="end_x">End X:</label>
        <input type="number" id="end_x" value="10" min="0">
        <label for="end_y">End Y:</label>
        <input type="number" id="end_y" value="10" min="0">
        <br><br>
        <button id="generate_btn">Generate Grid</button>
        <button id="reset_btn">  Reset Grid</button>
    </div>
    <div id = "algorithm">
        <h3>Algorithm</h3>
         <label>
            <input type="radio" name = "algorithm" value="BFS" id = "BFS">
            BFS
        </label>
        <br>
        <label>
            <input type="radio" name = "algorithm" value="idk" id = "idk">
            Placeholder
        </label>
        <br>
        <button id="run_btn">Run Algorithm</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
